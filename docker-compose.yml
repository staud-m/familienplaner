services:
  db:
    image: postgres:16
    container_name: familienplaner-db
    environment:
      POSTGRES_DB: familienplaner
      POSTGRES_USER: familienplaner_user
      POSTGRES_PASSWORD: familienplaner_password
    ports:
      - "5432:5432"
    volumes:
      - familienplaner_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familienplaner_user -d familienplaner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: familienplaner-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://familienplaner_user:familienplaner_password@db:5432/familienplaner
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: familienplaner-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@familienplaner.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - familienplaner_pgadmindata:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  familienplaner_pgdata:
  familienplaner_pgadmindata:
